<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-image: var(--body-bg, url("{% static 'dashbboard_body_background.jpg' %}"));
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            color: #333;
        }
        .navbar {
            margin-bottom: 30px;
            min-height: 180px;
            background: var(--navbar-bg, url("{% static 'dashboard_header.png' %}")) center/cover no-repeat;
            position: relative;
            backdrop-filter: blur(2px);
        }

        .navbar .container {
            align-items: center;
            min-height: 180px;
            display: flex;
        }

        .navbar .navbar-brand,
        .navbar .nav-link,
        .navbar .dropdown-toggle {
            color: #fff !important;
            font-weight: 700;
            text-shadow: 0 1px 10px rgba(0,0,0,0.6);
            border-radius: 8px;
            padding: 8px 14px;
            margin-right: 4px;
        }

        .navbar .navbar-brand {
            font-size: 2.2rem;
            letter-spacing: 0.7px;
            background: none;
            padding: 5px 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .navbar .navbar-brand img {
            display: block;
            width: auto;
            height: 68px;
        }

        .navbar .nav-link {
            margin-right: 2px;
        }

        .navbar .dropdown-menu .dropdown-item {
            color: #222;
        }

        .navbar {
            z-index: 9999;
        }

        .dropdown-menu {
            z-index: 20000;
        }

        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body {% block body_style %}style="--navbar-bg: url('{% static "dashboard_header.png" %}')"{% endblock %}>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="min-height: 72px;">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                {% block navbar_brand %}
                    <a class="navbar-brand" href="{% url 'dashboard' %}">ContactHub</a>
                {% endblock %}
            </div>

            <div class="d-flex align-items-center gap-3">
                <ul class="navbar-nav d-flex flex-row align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact_list' %}">Contacts</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about_us' %}">About Us</a></li>
                </ul>

                <div class="ms-2">
                    {% if user.is_authenticated %}
                        <div class="position-relative" style="min-width: 45px;">
                            <button class="btn btn-outline-light btn-sm" type="button" id="settingsToggle" style="border-radius: 50%; width: 42px; height: 42px; padding: 0; font-size: 24px;">☰</button>
                            <div id="settingsMenu" class="shadow" style="display:none; position:absolute; right:0; top:52px; background:#fff; border-radius:8px; min-width:150px; box-shadow:0 8px 20px rgba(0,0,0,0.25); z-index: 20000;">
                                <div style="padding:8px 12px; font-weight:700; border-bottom:1px solid #e9ecef;">{{ user.username }}</div>
                                <a class="dropdown-item" href="#" style="display:block; padding:8px 12px; color:#212529;">Profile</a>
                                <form action="{% url 'logout' %}" method="post" style="margin:0;">
                                    {% csrf_token %}
                                    <button type="submit" class="btn" style="width:100%; text-align:left; padding:8px 12px; border:none; background:none; color:#212529;">Logout</button>
                                </form>
                            </div>
                        </div>
                    {% else %}
                        <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggle = document.getElementById('settingsToggle');
            const menu = document.getElementById('settingsMenu');
            if (!toggle || !menu) return;

            toggle.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
            });

            document.addEventListener('click', function (event) {
                if (!toggle.contains(event.target) && !menu.contains(event.target)) {
                    menu.style.display = 'none';
                }
            });
        });
    </script>

    <div class="container mt-3">
        {% block page_header %}{% endblock %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
