{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="card p-4">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h2>My Contacts</h2>
        <div>
            <input type="text" id="contactSearch" class="form-control" placeholder="Search by name or email...">
            <a href="{% url 'export_csv' %}" class="btn btn-outline-primary">📥 Export</a>
            <a href="{% url 'contact_add' %}" class="btn btn-primary text-nowrap">Add Contact</a>
        </div>
    </div>
    <table class="table table-hover" id="contactTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Category</th>
            </tr>
        </thead>
        <tbody>
            {% for c in contacts %}
            <tr>
                <td>{{ c.first_name }} {{ c.last_name }}</td>
                <td>{{ c.email }}</td>
                <td>{{ c.phone }}</td>
                <td><span class="badge bg-info text-dark">{{ c.category }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script src="{% static 'js/scripts.js' %}"></script>
{% endblock %}
