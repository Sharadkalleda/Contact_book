{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5 mt-5 border-danger">
            <h2 class="text-danger">Delete Contact</h2>
            <p class="lead">Are you sure you want to delete <strong>{{ contact.first_name }} {{ contact.last_name }}</strong>?</p>
            <p class="text-muted">This action cannot be undone.</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Confirm Delete</button>
                <a href="{% url 'contact_detail' contact.pk %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
